<!DOCTYPE html>
<html lang="en">
<head>
<meta name="title" content="Color Contrast Analyzer Tool – Check WCAG Accessibility Ratio">
<meta name="description" content="Free Color Contrast Analyzer Tool to check WCAG AA & AAA accessibility standards. Calculate contrast ratio between foreground and background colors using HEX and RGB values with live preview.">
<meta name="keywords" content="color contrast analyzer, WCAG checker, accessibility tool, contrast ratio checker, HEX color checker, RGB contrast tool, web accessibility, UI UX accessibility, color checker tool, developer tools">
<meta name="robots" content="index, follow">
<meta name="author" content="Deep Mega Tools">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color Contrast Analyzer | Accessible</title>

<style>
*{ margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;}

 #Body{
    background:#f2f2f2;
    padding:20px;
    color:#222;}
#main .container{
    max-width:900px;
    margin:auto;}

#main .container h1{
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
}

#main .container .card{
    background:#fff;
    border:1px solid #dcdcdc;
    border-radius:12px;
    padding:25px;
    margin-bottom:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

#main .container .card h2{
    text-align:center;
    margin-bottom:10px;
    font-size:32px;
}

#main .container .card .controls{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-bottom:25px;
}

#main .container .card .controls .input-group label{
    display:block;
    font-size:15px;
    margin-bottom:8px;
    font-weight:bold;
}

#main .container .card .controls .input-group input,
.input-group select{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:18px;
    outline:none;
}

#main .container .color-box{
    width:100%;
    height:52px;
    border-radius:8px;
    border:2px solid #ddd;
    cursor:pointer;
}

#main .container .range-box{
    margin-top:10px;
}
#main .container .range-retro {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 10px;
      background: #d6c5ae;
      border-radius: 20px;
      box-shadow: inset 0 1px 3px #8b7355, 0 1px 0 #fcf3e0;
    }

   #main .container .range-retro::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle, #e7cba5, #c2a16b);
      border-radius: 50%;
      border: 1px solid #744e2e;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,200,0.8);
      cursor: pointer;
      margin-top: -7px;
    }

   #main .container .range-retro::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

  #main .container .range-retro::-moz-range-track {
      height: 10px;
      background: #d6c5ae;
      border-radius: 20px;
    }

    #main .container .range-retro::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: radial-gradient(circle, #e7cba5, #c2a16b);
      border-radius: 50%;
      border: 1px solid #744e2e;
      cursor: pointer;
    }

#main .container .range-box label {
    display: block;
    margin-bottom: 10px;
    font-size: 18px;
    font-weight: normal;
    color: #222;
    cursor: pointer;
}

#main .container .preview{
    margin-top:15px;
    border-radius:10px;
    padding:35px 20px;
    text-align:center;
    border:3px solid #ddd;
}

#main .container .preview .small{
    font-size:22px;
    margin-bottom:10px;
}

#main .container .preview .large{
    font-size:55px;
    font-weight:bold;
}

#main .container .result{
    margin-top:5px;
}

#main .container .result h3{
    font-size:35px;
    margin-bottom:20px;
    text-align:center;
}

#main .container table{
    width:100%;
    border-collapse:collapse;
    text-align:center;
    overflow:hidden;
    border-radius:10px;
}

table th,
table td{
    border:1px solid #ccc;
    padding:18px;
    font-size:20px;
}

.pass{
    background:#9be58e;
    font-weight:bold;
}

.fail{
    background:#ffb3b3;
    font-weight:bold;
}

@media(max-width:600px){

    h1{
        font-size:30px;
    }

    .card h2{
        font-size:25px;
    }

    .preview .large{
        font-size:38px;
    }

    table th,
    table td{
        font-size:16px;
        padding:12px;
    }
}
</style>
</head>
<body id="Body">
<main id="main">
<div class="container">

    <h1>Color Contrast Analyzer</h1>

    <!-- FOREGROUND CARD -->
    <div class="card">

        <h2>Foreground Color</h2>

        <div class="controls">
            <!-- HEX input with associated label -->
            <div class="input-group">
                <label for="fgHex">Hex</label>
                <input type="text" id="fgHex" value="#FFFFFF">
            </div>
            <!-- RGB readonly with associated label -->
            <div class="input-group">
                <label for="fgRgb">RGB</label>
                <input type="text" id="fgRgb" readonly>
            </div>
            <!-- Color picker with associated label -->
            <div class="input-group">
                <label for="fgColor">Color</label>
                <input type="color" id="fgColor" value="#ffffff" class="color-box">
            </div>
            <!-- Select dropdown with associated label -->
            <div class="input-group">
                <label for="fgName">Name</label>
                <select id="fgName">
                    <option value="#ffffff">White</option>
                    <option value="#000000">Black</option>
                    <option value="#ff0000">Red</option>
                    <option value="#00ff00">Lime</option>
                    <option value="#0000ff">Blue</option>
                    <option value="#ffff00">Yellow</option>
                    <option value="#ff00ff">Magenta</option>
                    <option value="#00ffff">Cyan</option>
                </select>
            </div>
        </div>

        <div class="range-box">
            <!-- Associated label for range slider (Accessibility fix) -->
            <label for="fgLight">Adjust Lightness : <span id="fgLightText">100</span>%</label>
            <input type="range" id="fgLight" min="0" max="100" value="100" class="range-retro">
        </div>

    </div>

    <!-- BACKGROUND CARD -->
    <div class="card">

        <h2>Background Color</h2>

        <div class="controls">
            <!-- HEX input with associated label -->
            <div class="input-group">
                <label for="bgHex">Hex</label>
                <input type="text" id="bgHex" value="#000000">
            </div>
            <!-- RGB readonly with associated label -->
            <div class="input-group">
                <label for="bgRgb">RGB</label>
                <input type="text" id="bgRgb" readonly>
            </div>
            <!-- Color picker with associated label -->
            <div class="input-group">
                <label for="bgColor">Color</label>
                <input type="color" id="bgColor" value="#000000" class="color-box">
            </div>
            <!-- Select dropdown with associated label -->
            <div class="input-group">
                <label for="bgName">Name</label>
                <select id="bgName">
                    <option value="#000000">Black</option>
                    <option value="#ffffff">White</option>
                    <option value="#ff0000">Red</option>
                    <option value="#00ff00">Lime</option>
                    <option value="#0000ff">Blue</option>
                    <option value="#ffff00">Yellow</option>
                    <option value="#ff00ff">Magenta</option>
                    <option value="#00ffff">Cyan</option>
                </select>
            </div>
        </div>

        <div class="range-box">
            <!-- Associated label for range slider (Accessibility fix) -->
            <label for="bgLight">Adjust Lightness : <span id="bgLightText">0</span>%</label>
            <input type="range" id="bgLight" min="0" max="100" value="0" class="range-retro">
        </div>

    </div>

    <!-- RESULT SECTION -->
    <div class="card result">

        <h3>Result</h3>

        <div class="preview" id="preview">
            <div class="small">Small sample text.</div>
            <div class="large">Large sample text.</div>
        </div>

        <h2 style="margin-top:25px;">
            Contrast Ratio = <span id="ratio">21.00</span>:1
        </h2>

        <table>
            <thead>
                <tr>
                    <th>WCAG Standard</th>
                    <th>Small Text</th>
                    <th>Large Text / UI</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>AA</td>
                    <td id="aaSmall">—</td>
                    <td id="aaLarge">—</td>
                </tr>
                <tr>
                    <td>AAA</td>
                    <td id="aaaSmall">—</td>
                    <td id="aaaLarge">—</td>
                </tr>
            </tbody>
        </table>

    </div>

</div>
</main>
<script>

const fgColor = document.getElementById("fgColor");
const bgColor = document.getElementById("bgColor");

const fgHex = document.getElementById("fgHex");
const bgHex = document.getElementById("bgHex");

const fgRgb = document.getElementById("fgRgb");
const bgRgb = document.getElementById("bgRgb");

const fgName = document.getElementById("fgName");
const bgName = document.getElementById("bgName");

const fgLight = document.getElementById("fgLight");
const bgLight = document.getElementById("bgLight");

const fgLightText = document.getElementById("fgLightText");
const bgLightText = document.getElementById("bgLightText");

const preview = document.getElementById("preview");
const ratioText = document.getElementById("ratio");

function hexToRgb(hex){

    hex = hex.replace("#","");

    let r = parseInt(hex.substring(0,2),16);
    let g = parseInt(hex.substring(2,4),16);
    let b = parseInt(hex.substring(4,6),16);

    return {r,g,b};
}

function rgbToHex(r,g,b){

    return "#" + [r,g,b]
    .map(x => {
        const hex = x.toString(16);
        return hex.length === 1 ? "0"+hex : hex;
    }).join("");
}

function adjustLightness(hex, percent){

    let {r,g,b} = hexToRgb(hex);

    r = Math.round(r * percent / 100);
    g = Math.round(g * percent / 100);
    b = Math.round(b * percent / 100);

    return rgbToHex(r,g,b);
}

function luminance(r,g,b){

    let a = [r,g,b].map(v => {

        v /= 255;

        return v <= 0.03928
        ? v / 12.92
        : Math.pow((v + 0.055)/1.055, 2.4);

    });

    return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
}

function contrastRatio(hex1, hex2){

    const c1 = hexToRgb(hex1);
    const c2 = hexToRgb(hex2);

    const l1 = luminance(c1.r,c1.g,c1.b);
    const l2 = luminance(c2.r,c2.g,c2.b);

    const brightest = Math.max(l1,l2);
    const darkest = Math.min(l1,l2);

    return ((brightest + 0.05) / (darkest + 0.05)).toFixed(2);
}

function setPassFail(id, pass){

    const el = document.getElementById(id);

    if(pass){
        el.innerHTML = "Pass";
        el.className = "pass";
    }else{
        el.innerHTML = "Fail";
        el.className = "fail";
    }
}

function update(){

    let fg = adjustLightness(fgColor.value, fgLight.value);
    let bg = adjustLightness(bgColor.value, bgLight.value);

    fgHex.value = fg.toUpperCase();
    bgHex.value = bg.toUpperCase();

    let fgRGB = hexToRgb(fg);
    let bgRGB = hexToRgb(bg);

    fgRgb.value = `${fgRGB.r}, ${fgRGB.g}, ${fgRGB.b}`;
    bgRgb.value = `${bgRGB.r}, ${bgRGB.g}, ${bgRGB.b}`;

    preview.style.color = fg;
    preview.style.background = bg;

    const ratio = parseFloat(contrastRatio(fg,bg));

    ratioText.innerText = ratio.toFixed(2);

    setPassFail("aaSmall", ratio >= 4.5);
    setPassFail("aaLarge", ratio >= 3);

    setPassFail("aaaSmall", ratio >= 7);
    setPassFail("aaaLarge", ratio >= 4.5);

    fgLightText.innerText = fgLight.value;
    bgLightText.innerText = bgLight.value;
}

fgColor.addEventListener("input", update);
bgColor.addEventListener("input", update);

fgLight.addEventListener("input", update);
bgLight.addEventListener("input", update);

fgName.addEventListener("change", ()=>{

    fgColor.value = fgName.value;
    update();

});

bgName.addEventListener("change", ()=>{

    bgColor.value = bgName.value;
    update();

});

fgHex.addEventListener("change", ()=>{

    fgColor.value = fgHex.value;
    update();

});

bgHex.addEventListener("change", ()=>{

    bgColor.value = bgHex.value;
    update();

});

update();

</script>

</body>
</html>
